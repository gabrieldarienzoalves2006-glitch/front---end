<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Vendas - Infinity Bank</title>
</head>
<body>
    <h1>Simulador de Vendas - Infinity Bank</h1>
    <form id="salesForm">
        <label for="bandeira">Escolha a bandeira:</label>
        <select id="bandeira" name="bandeira">
            <option value="visa">Visa</option>
            <option value="master">Master</option>
            <option value="elo">Elo</option>
        </select><br><br>

        <label for="valor">Valor da venda:</label>
        <input type="number" id="valor" name="valor" required><br><br>

        <label for="parcelas">Número de parcelas:</label>
        <input type="number" id="parcelas" name="parcelas" required><br><br>

        <button type="button" onclick="calcular()">Calcular</button>
    </form>

    <h2>Resumo da Venda</h2>
    <p id="resumo"></p>
</body>
</html>
