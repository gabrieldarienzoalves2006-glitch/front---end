<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Escolar</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Média Escolar</h1>
    <form id="gradeForm">
        <label for="nomeAluno">Nome do Aluno:</label>
        <input type="text" id="nomeAluno" required>
        <br><br>
        <label for="nota1">Nota 1:</label>
        <input type="number" id="nota1" min="0" max="10" step="0.1" required>
        <br><br>
        <label for="nota2">Nota 2:</label>
        <input type="number" id="nota2" min="0" max="10" step="0.1" required>
        <br><br>
        <label for="nota3">Nota 3:</label>
        <input type="number" id="nota3" min="0" max="10" step="0.1" required>
        <br><br>
        <button type="button" onclick="calcularMedia()">Calcular Média</button>
    </form>
    <div id="results"></div>
    
</body>
</html>
