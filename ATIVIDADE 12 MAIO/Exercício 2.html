<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Conversor de Temperatura</h1>
    <label for="celsius">Celsius:</label>
        <input type="number" id="celsius" step="0.01" placeholder="Digite a temperatura em Celsius">
        <br><br>
        <label for="fahrenheit">Fahrenheit:</label>
        <input type="number" id="fahrenheit" step="0.01" placeholder="Digite a temperatura em Fahrenheit">
        <br><br>
        <button onclick="converterCelsius()">Converter para Fahrenheit</button>
        <button onclick="converterFahrenheit()">Converter para Celsius</button>
        <p id="resultado"></p>
        <script src="script.js"></script>
</body>
</html>
