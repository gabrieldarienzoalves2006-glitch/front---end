<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Orçamento para Festas & Eventos</title>
    <link rel="stylesheet" href="style ex6.css">
</head>
<body>
    <h1>Calculadora de Orçamento para Festas & Eventos</h1>
    
    <label for="pacote">Escolha o Pacote:</label>
    <select id="pacote">
        <option value="50">Standard - R$ 50,00 por pessoa</option>
        <option value="80">Premium - R$ 80,00 por pessoa</option>
        <option value="120">Infinity Deluxe - R$ 120,00 por pessoa</option>
    </select>
    
    <label for="quantidade">Quantidade de Pessoas:</label>
    <input type="number" id="quantidade" min="1" placeholder="Digite a quantidade de convidados">
    
    <button onclick="calcularOrçamento()">Calcular Orçamento</button>
    
    <div id="resultado"></div>

    
    <script src="script ex6.js"></script>
</body>
</html>
